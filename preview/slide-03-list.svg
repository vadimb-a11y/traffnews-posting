<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <radialGradient id="bg3" cx="540" cy="700" r="650">
      <stop offset="0%" stop-color="#5b2a8f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0c0620" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1350" fill="#1a0d3a"/>
  <rect width="1080" height="1350" fill="url(#bg3)"/>
  <rect width="1080" height="1350" fill="url(#grid3)"/>

  <text x="60" y="80" font-family="'Courier New', monospace" font-size="26" fill="#ffffff" font-weight="bold">Сокращения 2026</text>
  <text x="1020" y="80" font-family="'Courier New', monospace" font-size="26" fill="#ffffff" font-weight="bold" text-anchor="end">2026</text>

  <!-- Section title (big white bold) — два слова в строку -->
  <text x="60" y="220" font-family="Impact, 'Arial Black', sans-serif" font-size="110" fill="#ffffff" font-weight="900" letter-spacing="-3">КТО УЖЕ УРЕЗАЛ</text>

  <!-- Yellow accent underline -->
  <rect x="60" y="245" width="240" height="6" fill="#e8f045"/>

  <!-- Items: yellow company name + white description -->
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="370" font-size="50" fill="#e8f045" font-weight="900">Cloudflare</text>
    <text x="60" y="420" font-size="30" fill="#ffffff" font-weight="500">— 1 100+ человек (20% штата)</text>

    <text x="60" y="510" font-size="50" fill="#e8f045" font-weight="900">Block</text>
    <text x="60" y="560" font-size="30" fill="#ffffff" font-weight="500">— 4 000 человек (50% штата, проект Jack Dorsey)</text>

    <text x="60" y="650" font-size="50" fill="#e8f045" font-weight="900">Atlassian</text>
    <text x="60" y="700" font-size="30" fill="#ffffff" font-weight="500">— 1 600 сотрудников</text>

    <text x="60" y="790" font-size="50" fill="#e8f045" font-weight="900">Freshworks</text>
    <text x="60" y="840" font-size="30" fill="#ffffff" font-weight="500">— 500 человек</text>

    <text x="60" y="930" font-size="50" fill="#e8f045" font-weight="900">Coinbase</text>
    <text x="60" y="980" font-size="30" fill="#ffffff" font-weight="500">— 700 сотрудников</text>
  </g>

  <!-- Pixelarticons: pointer (hand cursor) -->
  <g transform="translate(820 1080) scale(5)" fill="#ffffff">
    <path d="M17 9h2v3h-2zm-4-2h2v4h-2zM9 3h2v8H9zM5 3h2v10H5zm14 6h2v2h-2zm-4-2h2v2h-2zm-4 0h2v2h-2zM7 1h2v2H7zM3 11h2v2H3zm-2 2h2v2H1zm0 2h2v2H1zm2 2h2v2H3zm2 2h2v2H5zm2 2h12v2H7zm12-2h2v2h-2zm2-8h2v8h-2zM5 13h2v2H5zm2 2h2v2H7z"/>
  </g>

  <!-- Footer -->
  <g transform="translate(60 1270)">
    <rect x="0" y="0" width="120" height="50" rx="25" fill="#ffffff"/>
    <text x="60" y="35" font-family="Inter, Arial, sans-serif" font-size="24" fill="#000000" font-weight="bold" text-anchor="middle">3/7</text>
  </g>
  <text x="200" y="1305" font-family="Inter, Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.85">Подробнее на traffnews.com</text>
  <g transform="translate(820 1270)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#ffffff"/>
    <text x="100" y="35" font-family="Inter, Arial, sans-serif" font-size="24" fill="#000000" font-weight="900" text-anchor="middle">TRAFFNEWS</text>
  </g>
