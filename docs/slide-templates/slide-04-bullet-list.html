<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!--
  Slide type: bullet_list
  Use for: список из 3-5 пунктов
  Reference: preview/slide-05-affected.svg
  Canvas: 1080×1350

  Variables:
    __bg_image_url__     — Replicate retrofuture-фон
    __topic_label__      — top-left header
    __year__             — top-right header
    __section_title__    — заголовок секции (CAPS, e.g. "КОГО РЕЖУТ ПЕРВЫМ")
    __bullet_1__ ... __bullet_5__  — пункты (1-5; пустые скрыть)
    __caption_text__     — мелкая подпись внизу (optional)
    __page_counter__     — счётчик
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@700&display=swap');
  body { margin: 0; font-family: 'Inter', sans-serif; }
  .canvas {
    position: relative; width: 1080px; height: 1350px;
    background: #1a0d3a; overflow: hidden;
  }
  .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .dim-overlay { position: absolute; inset: 0; background: rgba(26, 13, 58, 0.65); }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .top-header-left, .top-header-right {
    position: absolute; top: 60px;
    font-family: 'JetBrains Mono', monospace; font-size: 26px;
    font-weight: 700; color: #ffffff;
  }
  .top-header-left { left: 60px; }
  .top-header-right { right: 60px; }

  .section-title {
    position: absolute; left: 60px; top: 170px;
    font-family: 'Anton', Impact, sans-serif; font-size: 80px;
    color: #ffffff; font-weight: 900;
    letter-spacing: -2px; line-height: 1.05;
    max-width: 960px;
  }
  .title-underline {
    position: absolute; left: 60px; top: 305px;
    width: 220px; height: 6px; background: #e8f045;
  }

  .bullets {
    position: absolute; left: 60px; right: 60px; top: 410px;
  }
  .bullet {
    display: flex; align-items: flex-start;
    margin-bottom: 38px;
    font-size: 38px; color: #ffffff; font-weight: 500;
    line-height: 1.3;
  }
  .bullet-marker {
    color: #e8f045; font-weight: 900;
    margin-right: 24px; flex-shrink: 0;
    font-size: 44px; line-height: 1;
  }
  .bullet:empty { display: none; }

  .caption {
    position: absolute; left: 60px; right: 60px;
    bottom: 130px;
    font-size: 24px; color: #ffffff;
    opacity: 0.8; font-weight: 500;
  }

  .pill {
    position: absolute; top: 1270px; height: 50px;
    background: #ffffff; border-radius: 25px;
    display: flex; align-items: center; justify-content: center;
    color: #000000; font-size: 24px;
  }
  .pill-left { left: 60px; width: 120px; font-weight: 700; }
  .pill-right { right: 60px; width: 200px; font-weight: 900; }
  .footer-text {
    position: absolute; left: 200px; top: 1290px;
    font-size: 22px; color: #ffffff; opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg-img" src="__bg_image_url__" />
    <div class="dim-overlay"></div>
    <div class="grid"></div>

    <div class="top-header-left">__topic_label__</div>
    <div class="top-header-right">__year__</div>

    <div class="section-title">__section_title__</div>
    <div class="title-underline"></div>

    <div class="bullets">
      <div class="bullet"><span class="bullet-marker">→</span><span>__bullet_1__</span></div>
      <div class="bullet"><span class="bullet-marker">→</span><span>__bullet_2__</span></div>
      <div class="bullet"><span class="bullet-marker">→</span><span>__bullet_3__</span></div>
      <div class="bullet"><span class="bullet-marker">→</span><span>__bullet_4__</span></div>
      <div class="bullet"><span class="bullet-marker">→</span><span>__bullet_5__</span></div>
    </div>

    <div class="caption">__caption_text__</div>

    <div class="pill pill-left">__page_counter__</div>
    <div class="footer-text">Подробнее на traffnews.com</div>
    <div class="pill pill-right">TRAFFNEWS</div>
  </div>
</body>
</html>
